<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryVoyage ESL Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-inspector {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">StoryVoyage Adaptive Learning Sandbox</h1>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <!-- 1. State Simulator Panel -->
            <div class="bg-white p-4 rounded-lg shadow-md lg:col-span-1">
                <h2 class="text-lg font-semibold mb-2 border-b pb-1">1. Student State</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700">Current Level</label>
                        <select id="currentLevel" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-1 border text-sm">
                            <option value="unknown">Unknown (Assess Me)</option>
                            <option value="A1-Sub1">A1-Sub1</option>
                            <option value="A1-Sub2">A1-Sub2</option>
                            <option value="A1-Sub3">A1-Sub3</option>
                            <option value="A1-Sub4">A1-Sub4</option>
                            <option value="B1-Sub1">B1-Sub1</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">Plot History</label>
                        <textarea id="plotHistory" rows="3" class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 p-1 border text-xs" readonly>[]</textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">Preferences (JSON)</label>
                        <textarea id="storyPreferences" rows="2" class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 p-1 border text-xs">{"hero_name": "Leo", "theme": "Space"}</textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">X-App-Token</label>
                        <input type="text" id="appToken" value="super-secret-token" class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 p-1 border text-sm">
                    </div>
                    <button onclick="resetStory()" class="w-full bg-red-500 text-white py-1 rounded text-xs">Reset Story</button>
                </div>
            </div>

            <!-- 2. Interview/Setup Sandbox -->
            <div class="bg-white p-4 rounded-lg shadow-md flex flex-col h-[600px] lg:col-span-1">
                <h2 class="text-lg font-semibold mb-2 border-b pb-1">2. Story Setup</h2>
                <div id="chatBox" class="flex-grow overflow-y-auto mb-2 space-y-2 p-2 bg-gray-50 rounded border text-sm italic">
                    <div class="p-2 rounded-lg bg-gray-200">Say "שלום" to start!</div>
                </div>
                <div class="flex gap-1">
                    <input type="text" id="chatInput" placeholder="Hebrew/English..." class="flex-grow rounded-md border-gray-300 bg-gray-50 p-1 border text-sm">
                    <button onclick="sendChatMessage()" id="sendBtn" class="bg-blue-500 text-white px-3 py-1 rounded-md text-sm">Send</button>
                </div>
                <div id="pedagogicalPayload" class="mt-2 hidden border-t pt-1">
                    <h3 class="text-xs font-bold text-green-600 mb-1">Setup Done!</h3>
                    <div id="decisionJson" class="json-inspector"></div>
                </div>
            </div>

            <!-- 3. Scene & Assessment Sandbox -->
            <div class="bg-white p-4 rounded-lg shadow-md flex flex-col h-[600px] lg:col-span-2">
                <h2 class="text-lg font-semibold mb-2 border-b pb-1">3. The Adventure</h2>

                <div id="sceneActionArea" class="mb-2">
                    <button onclick="generateScene(null)" id="genSceneBtn" class="w-full bg-purple-500 text-white py-2 rounded-md hover:bg-purple-600 disabled:opacity-50 text-sm">Start Adventure</button>
                </div>

                <div id="sceneOutput" class="flex-grow overflow-y-auto space-y-3 p-2 bg-gray-50 rounded border hidden">
                    <div id="storyContent">
                        <h3 class="font-bold text-sm text-purple-700">English:</h3>
                        <p id="storyText" class="text-gray-800 italic text-sm mb-2"></p>
                        <h3 class="font-bold text-sm text-blue-700">Hebrew:</h3>
                        <p id="remedialText" class="text-gray-800 text-sm"></p>
                    </div>

                    <div id="assessmentSection" class="bg-yellow-50 p-2 rounded border border-yellow-200">
                        <div id="tasksContent" class="space-y-2 text-sm"></div>
                        <button onclick="evaluateAssessment()" id="evalBtn" class="mt-2 w-full bg-green-500 text-white py-1 rounded text-sm">Check Answer</button>
                    </div>

                    <div id="branchSection" class="hidden border-t pt-2">
                        <h3 class="font-bold text-sm mb-2 text-red-600">What happens next?</h3>
                        <div id="branchButtons" class="flex flex-col gap-2"></div>
                    </div>

                    <div id="feedbackSection" class="bg-green-50 p-2 rounded border border-green-200 hidden text-sm italic"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let lastDecision = null;
        let lastSceneData = null;
        let plotHistory = [];
        let sceneCount = 0;

        async function apiCall(endpoint, body) {
            const token = document.getElementById('appToken').value;
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-App-Token': token },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                const err = await response.json();
                alert(`Error: ${err.detail || response.statusText}`);
                throw new Error(err.detail);
            }
            return await response.json();
        }

        function getStudentState() {
            return {
                current_estimated_level: document.getElementById('currentLevel').value,
                covered_categories: {},
                assessment_history: [],
                story_preferences: JSON.parse(document.getElementById('storyPreferences').value || '{}'),
                total_scenes_completed: sceneCount
            };
        }

        function appendMessage(role, content) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-2 rounded-lg ${role === 'user' ? 'bg-blue-100 ml-4' : 'bg-gray-200 mr-4'}`;
            msgDiv.innerHTML = content;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            
            try {
                const data = await apiCall('/interview-chat', {
                    message: text,
                    history: chatHistory,
                    student_state: getStudentState()
                });

                if (data.is_final_turn) {
                    appendMessage('ai', "<b>מצוין! בניתי לנו סיפור. בוא נתחיל!</b>");
                    document.getElementById('pedagogicalPayload').classList.remove('hidden');
                    document.getElementById('decisionJson').innerText = JSON.stringify(data.pedagogical_decision, null, 2);
                    lastDecision = data.pedagogical_decision;
                    document.getElementById('currentLevel').value = data.pedagogical_decision.updated_level;
                } else {
                    appendMessage('ai', data.chat_response);
                    chatHistory.push({role: 'user', content: text});
                    chatHistory.push({role: 'model', content: data.chat_response});
                }
            } catch (e) { console.error(e); }
        }

        async function generateScene(branchId = null) {
            if (!lastDecision) return alert("Complete Setup first!");

            const btn = document.getElementById('genSceneBtn');
            btn.disabled = true;
            btn.innerText = "Generating...";

            document.getElementById('feedbackSection').classList.add('hidden');
            document.getElementById('branchSection').classList.add('hidden');

            try {
                const data = await apiCall('/generate-scene', {
                    category: lastDecision.category_name,
                    target_words: lastDecision.target_words,
                    plot_history: plotHistory,
                    selected_branch_id: branchId,
                    student_state: getStudentState(),
                    story_elements: lastDecision.story_elements
                });

                lastSceneData = data;
                sceneCount++;
                plotHistory.push(data.scene_text);
                document.getElementById('plotHistory').value = JSON.stringify(plotHistory, null, 2);

                document.getElementById('sceneOutput').classList.remove('hidden');
                document.getElementById('storyText').innerText = data.scene_text;
                document.getElementById('remedialText').innerText = data.remedial_scene_text;
                document.getElementById('genSceneBtn').classList.add('hidden');

                // Tasks
                const tasks = data.assessment_tasks;
                document.getElementById('tasksContent').innerHTML = `
                    <div class="p-2 border rounded bg-white">
                        <p class="font-semibold mb-1">${tasks.comprehension_question.question_text_hebrew}</p>
                        ${tasks.comprehension_question.options_hebrew.map((opt, i) => `
                            <label class="block"><input type="radio" name="q1" value="${i}"> ${opt}</label>
                        `).join('')}
                    </div>
                `;
                document.getElementById('assessmentSection').classList.remove('hidden');

            } catch (e) { console.error(e); }
            finally { btn.disabled = false; btn.innerText = "Start Adventure"; }
        }

        async function evaluateAssessment() {
            const q1 = document.querySelector('input[name="q1"]:checked')?.value;
            if (q1 === undefined) return alert("Answer the question!");

            try {
                const feedback = await apiCall('/evaluate-assessment', {
                    student_state: getStudentState(),
                    category: lastDecision.category_name,
                    level: document.getElementById('currentLevel').value,
                    answers: { q1: parseInt(q1) },
                    correct_answers: { q1: lastSceneData.assessment_tasks.comprehension_question.correct_option_index }
                });

                document.getElementById('feedbackSection').classList.remove('hidden');
                document.getElementById('feedbackSection').innerText = feedback.explanation_hebrew;
                document.getElementById('assessmentSection').classList.add('hidden');

                // Show Branches
                document.getElementById('branchSection').classList.remove('hidden');
                document.getElementById('branchButtons').innerHTML = lastSceneData.story_branches.map(b => `
                    <button onclick="generateScene(${b.choice_id})" class="bg-blue-100 hover:bg-blue-200 border border-blue-300 p-2 rounded text-xs text-left">
                        <b>${b.text_english}</b><br><span class="text-gray-600">${b.text_hebrew}</span>
                    </button>
                `).join('');

            } catch (e) { console.error(e); }
        }

        function resetStory() {
            plotHistory = [];
            sceneCount = 0;
            document.getElementById('plotHistory').value = "[]";
            document.getElementById('sceneOutput').classList.add('hidden');
            document.getElementById('genSceneBtn').classList.remove('hidden');
            document.getElementById('chatBox').innerHTML = '<div class="p-2 rounded-lg bg-gray-200">Say "שלום" to start!</div>';
            chatHistory = [];
            lastDecision = null;
        }
    </script>
</body>
</html>
