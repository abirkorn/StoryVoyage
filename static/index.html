<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryVoyage Advanced Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-inspector {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            font-size: 0.75rem;
            max-height: 350px;
            overflow-y: auto;
        }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .dag-node { border: 1px solid #e5e7eb; padding: 10px; border-radius: 8px; background: white; margin-bottom: 10px; }
        .node-level-0 { border-left: 5px solid #3b82f6; }
        .node-level-1 { border-left: 5px solid #10b981; }
        .node-level-2 { border-left: 5px solid #f59e0b; }
        .node-level-3 { border-left: 5px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 text-sm">
    <div class="max-w-7xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-blue-700">StoryVoyage DAG Sandbox</h1>
            <div class="flex gap-4">
                <input type="text" id="appToken" value="super-secret-token" class="border p-1 rounded w-48" placeholder="X-App-Token">
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex gap-8 mb-6 border-b overflow-x-auto">
            <button onclick="showTab('launchpad')" id="tab-launchpad" class="pb-2 px-1 font-medium transition-all tab-active whitespace-nowrap">Step 1: Launchpad</button>
            <button onclick="showTab('dag')" id="tab-dag" class="pb-2 px-1 font-medium transition-all whitespace-nowrap">Step 2: DAG View</button>
            <button onclick="showTab('act')" id="tab-act" class="pb-2 px-1 font-medium transition-all whitespace-nowrap">Step 3: Act Generator</button>
            <button onclick="showTab('wizard')" id="tab-wizard" class="pb-2 px-1 font-medium transition-all whitespace-nowrap">Interview Wizard</button>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

            <div class="lg:col-span-3">

                <!-- Tab: Launchpad -->
                <div id="view-launchpad" class="space-y-4">
                    <div class="bg-white p-6 rounded-lg shadow-sm border">
                        <h2 class="text-lg font-bold mb-4">Adventure Setup (Premises)</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
                            <div class="col-span-1">
                                <label class="block font-medium text-xs text-gray-500 uppercase">Genre</label>
                                <select id="launchGenre" class="w-full border p-2 rounded">
                                    <option value="Fantasy & Magic">Fantasy & Magic</option>
                                    <option value="Adventure & Exploration">Adventure & Exploration</option>
                                    <option value="Sci-Fi & Space">Sci-Fi & Space</option>
                                    <option value="Mystery & Detective">Mystery & Detective</option>
                                </select>
                            </div>
                            <div>
                                <label for="launchRank" class="block font-medium text-xs text-gray-500 uppercase">Current Student Rank</label>
                                <input type="number" id="launchRank" value="100" class="w-full border p-2 rounded">
                            </div>
                            <div>
                                <label for="launchQuery" class="block font-medium text-xs text-gray-500 uppercase">Semantic Hint (Optional)</label>
                                <input type="text" id="launchQuery" value="" class="w-full border p-2 rounded" placeholder="e.g. underwater, lions">
                            </div>
                        </div>
                        <button onclick="setupAdventure()" id="launchBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-medium w-full hover:bg-blue-700">Generate 3 Premises</button>

                        <div id="launchResult" class="mt-8 space-y-4 hidden">
                            <h3 class="font-bold text-gray-700 uppercase text-xs">Story Options</h3>
                            <div id="premiseList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

                            <div>
                                <h3 class="font-bold text-gray-700 mb-1 uppercase text-xs">Vocabulary Pool:</h3>
                                <div id="launchWords" class="text-[10px] text-gray-500 flex flex-wrap gap-2 p-2 bg-gray-100 rounded border"></div>
                            </div>
                            <div class="json-inspector" id="launchJson"></div>
                        </div>
                    </div>
                </div>

                <!-- Tab: DAG View -->
                <div id="view-dag" class="hidden space-y-4">
                    <div class="bg-white p-6 rounded-lg shadow-sm border">
                        <h2 class="text-lg font-bold mb-4">Story DAG Structure</h2>
                        <div id="dagHeader" class="mb-4 p-3 bg-blue-50 border rounded hidden">
                            <p class="font-bold" id="dagTitle"></p>
                            <p class="text-xs italic" id="dagSummary"></p>
                        </div>
                        <div id="dagNodesList" class="space-y-2">
                            <p class="text-gray-400 italic">Select a premise in Launchpad to generate a DAG.</p>
                        </div>
                        <div class="json-inspector mt-4" id="dagJson"></div>
                    </div>
                </div>

                <!-- Tab: Act Generator -->
                <div id="view-act" class="hidden space-y-4">
                    <div class="bg-white p-6 rounded-lg shadow-sm border">
                        <h2 class="text-lg font-bold mb-4">Prose Generator</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-400">Story Title</label>
                                <input type="text" id="actStoryTitle" class="w-full border p-2 rounded text-xs bg-gray-50" readonly>
                            </div>
                             <div>
                                <label class="block text-xs font-bold uppercase text-gray-400">Level</label>
                                <input type="text" id="actLevel" value="A1-Sub1" class="w-full border p-2 rounded text-xs">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-400">Word Count (Pool)</label>
                                <input type="text" id="actWordCountDisplay" class="w-full border p-2 rounded text-xs bg-gray-50" readonly>
                            </div>
                        </div>

                        <label class="block text-xs font-bold uppercase text-gray-400">Selected DAG Node (JSON)</label>
                        <textarea id="actNodeInput" rows="6" class="w-full border p-2 rounded text-xs font-mono mb-2 bg-gray-50" readonly></textarea>

                        <button onclick="generateActProse()" id="genActBtn" class="bg-green-600 text-white px-6 py-2 rounded font-medium w-full">Generate Act Prose</button>

                        <div id="actResult" class="mt-4 hidden space-y-4">
                            <div class="p-4 bg-white border rounded shadow-inner">
                                <div id="actSceneText" class="prose prose-sm max-w-none italic text-gray-800 whitespace-pre-wrap"></div>
                            </div>
                            <div id="actUsedWords" class="flex flex-wrap gap-2"></div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="p-3 bg-blue-50 border rounded">
                                    <p class="font-bold text-xs mb-2 uppercase">Comprehension</p>
                                    <p id="actQuestion" class="text-sm mb-2"></p>
                                    <div id="actOptions" class="space-y-1"></div>
                                </div>
                                <div class="p-3 bg-purple-50 border rounded">
                                    <p class="font-bold text-xs mb-2 uppercase">Next Choices</p>
                                    <div id="actBranches" class="space-y-2"></div>
                                </div>
                            </div>
                            <div id="actProseJson" class="json-inspector"></div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Wizard -->
                <div id="view-wizard" class="hidden space-y-4">
                    <div class="bg-white p-6 rounded-lg shadow-sm border h-[600px] flex flex-col">
                        <h2 class="text-lg font-bold mb-4">Pedagogical Wizard</h2>
                        <div id="chatBox" class="flex-grow overflow-y-auto space-y-3 mb-4 p-4 bg-gray-100 rounded border italic"></div>
                        <div class="flex gap-2">
                            <input type="text" id="chatInput" placeholder="Type here..." class="flex-grow border p-2 rounded">
                            <button onclick="sendWizardChat()" class="bg-blue-600 text-white px-6 py-2 rounded font-medium">Send</button>
                        </div>
                        <div id="wizardDecision" class="mt-4 hidden">
                            <div id="wizardDecisionJson" class="json-inspector"></div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Global State -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <h2 class="font-bold uppercase text-gray-500 mb-2 text-xs">Selection Info</h2>
                    <div class="space-y-2 text-xs">
                        <div>
                             <p class="text-gray-400">Premise:</p>
                             <p id="s-premise" class="font-bold">-</p>
                        </div>
                        <div>
                             <p class="text-gray-400">Selected Node:</p>
                             <p id="s-node" class="font-bold">-</p>
                        </div>
                        <div>
                             <p class="text-gray-400">Words Selected:</p>
                             <p id="s-words-count" class="font-bold">0</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let gState = {
            rank: 100,
            launchData: null,
            selectedPremise: null,
            dag: null,
            selectedNode: null,
            wizardHistory: []
        };

        async function apiCall(endpoint, body) {
            console.log(`[API Call] -> ${endpoint}`, body);
            const token = document.getElementById('appToken').value;
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-App-Token': token },
                    body: JSON.stringify(body)
                });
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText);
                }
                const data = await response.json();
                console.log(`[API Response] <- ${endpoint}`, data);
                return data;
            } catch (e) {
                console.error(`[Fetch Failed] ${e}`);
                alert(`Error: ${e.message}`);
                throw e;
            }
        }

        function showTab(id) {
            ['launchpad', 'dag', 'act', 'wizard'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('tab-active');
            });
            document.getElementById('view-' + id).classList.remove('hidden');
            document.getElementById('tab-' + id).classList.add('tab-active');
        }

        async function setupAdventure() {
            const btn = document.getElementById('launchBtn');
            btn.disabled = true; btn.innerText = "Generating Premises...";
            const body = {
                rank_index: parseInt(document.getElementById('launchRank').value),
                genre: document.getElementById('launchGenre').value,
                semantic_query: document.getElementById('launchQuery').value
            };
            try {
                const data = await apiCall('/adventure/setup', body);
                gState.launchData = data;
                gState.rank = body.rank_index;

                document.getElementById('launchResult').classList.remove('hidden');
                document.getElementById('launchWords').innerHTML = data.selected_vocabulary.map(w => `<span class='bg-white px-1 border rounded'>${w}</span>`).join('');
                document.getElementById('launchJson').innerText = JSON.stringify(data, null, 2);
                document.getElementById('s-words-count').innerText = data.selected_vocabulary.length;

                const list = document.getElementById('premiseList');
                list.innerHTML = data.premises.map(p => `
                    <div class="bg-blue-50 p-4 border rounded shadow-sm flex flex-col justify-between">
                        <div>
                            <h4 class="font-bold text-sm mb-1">${p.title}</h4>
                            <p class="text-[10px] text-gray-600 mb-2"><b>Hero:</b> ${p.hero}</p>
                            <p class="text-[10px] text-gray-600"><b>Start:</b> ${p.catalyst}</p>
                        </div>
                        <button onclick="selectPremise('${p.id}')" class="mt-3 bg-blue-600 text-white py-1 rounded text-xs font-bold">Select & Build DAG</button>
                    </div>
                `).join('');
            } catch (e) {} finally { btn.disabled = false; btn.innerText = "Generate 3 Premises"; }
        }

        async function selectPremise(id) {
            const premise = gState.launchData.premises.find(p => p.id === id);
            gState.selectedPremise = premise;
            document.getElementById('s-premise').innerText = premise.title;

            showTab('dag');
            const list = document.getElementById('dagNodesList');
            list.innerHTML = `<p class="text-blue-600 animate-pulse">Constructing Story DAG for "${premise.title}"...</p>`;

            try {
                const body = {
                    premise: premise,
                    target_words: gState.launchData.selected_vocabulary,
                    student_state: { current_rank_index: gState.rank }
                };
                const dag = await apiCall('/adventure/generate-dag', body);
                gState.dag = dag;
                renderDAG(dag);
            } catch (e) {
                list.innerHTML = `<p class="text-red-500">Failed to build DAG: ${e.message}</p>`;
            }
        }

        function renderDAG(dag) {
            document.getElementById('dagHeader').classList.remove('hidden');
            document.getElementById('dagTitle').innerText = gState.selectedPremise.title;
            document.getElementById('dagSummary').innerText = gState.selectedPremise.setting;
            document.getElementById('dagJson').innerText = JSON.stringify(dag, null, 2);

            const list = document.getElementById('dagNodesList');
            list.innerHTML = '';

            // Sort nodes by level then act number
            const nodes = Object.values(dag.nodes).sort((a,b) => a.level - b.level || a.act_number - b.act_number);

            nodes.forEach(n => {
                const div = document.createElement('div');
                div.className = `dag-node node-level-${n.level}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-gray-400 uppercase">Level ${n.level} | Act ${n.act_number}</span>
                            <h4 class="font-bold">${n.title}</h4>
                            <p class="text-[10px] text-gray-500 italic">${n.description}</p>
                            <div class="mt-2 text-[10px]">
                                <b>Path:</b> ${n.starting_point} ➔ ${n.ending_point}
                            </div>
                        </div>
                        <button onclick="prepareAct('${n.node_id}')" class="bg-green-100 text-green-700 px-3 py-1 rounded text-[10px] font-bold hover:bg-green-200">Generate Prose</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function prepareAct(nodeId) {
            const node = gState.dag.nodes[nodeId];
            gState.selectedNode = node;

            document.getElementById('s-node').innerText = node.title;
            document.getElementById('actStoryTitle').value = gState.selectedPremise.title;
            document.getElementById('actNodeInput').value = JSON.stringify(node, null, 2);
            document.getElementById('actWordCountDisplay').value = gState.launchData.selected_vocabulary.length + " words";

            showTab('act');
        }

        async function generateActProse() {
            const btn = document.getElementById('genActBtn');
            btn.disabled = true; btn.innerText = "Writing Story...";

            try {
                const body = {
                    story_title: gState.selectedPremise.title,
                    node: gState.selectedNode,
                    target_words: gState.launchData.selected_vocabulary,
                    student_state: { current_estimated_level: document.getElementById('actLevel').value },
                    hero_description: gState.selectedPremise.hero,
                    setting_description: gState.selectedPremise.setting,
                    catalyst_description: gState.selectedPremise.catalyst
                };
                const data = await apiCall('/story/generate-act-content', body);

                document.getElementById('actResult').classList.remove('hidden');
                document.getElementById('actSceneText').innerText = data.scene_text;
                document.getElementById('actUsedWords').innerHTML = data.used_vocabulary.map(w => `<span class='bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold'>${w}</span>`).join('');

                document.getElementById('actQuestion').innerText = data.assessment_tasks.comprehension_question.question_text_hebrew;
                document.getElementById('actOptions').innerHTML = data.assessment_tasks.comprehension_question.options_hebrew.map((o, i) => `
                    <div class="text-xs p-1 border rounded bg-white ${i === data.assessment_tasks.comprehension_question.correct_option_index ? 'border-green-500 bg-green-50' : ''}">${o}</div>
                `).join('');

                document.getElementById('actBranches').innerHTML = data.story_branches.map(b => `
                    <div class="p-2 border rounded bg-white shadow-sm">
                        <p class="font-bold text-xs">${b.text_english}</p>
                        <p class="text-[10px] text-gray-500">${b.text_hebrew}</p>
                    </div>
                `).join('') || '<p class="text-xs italic text-gray-400">End of this path.</p>';

                document.getElementById('actProseJson').innerText = JSON.stringify(data, null, 2);

            } catch (e) {} finally { btn.disabled = false; btn.innerText = "Generate Act Prose"; }
        }

        // Wizard
        async function sendWizardChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim(); if (!text) return;
            appendChat('chatBox', 'user', text);
            input.value = '';
            try {
                const data = await apiCall('/interview-chat', {
                    message: text,
                    history: gState.wizardHistory,
                    student_state: { current_estimated_level: 'unknown', current_rank_index: gState.rank }
                });
                if (data.is_final_turn) {
                    appendChat('chatBox', 'ai', "<b>Interview Concluded!</b> Settings captured.");
                    document.getElementById('wizardDecision').classList.remove('hidden');
                    document.getElementById('wizardDecisionJson').innerText = JSON.stringify(data.pedagogical_decision, null, 2);
                } else {
                    appendChat('chatBox', 'ai', data.chat_response);
                    gState.wizardHistory.push({ role: 'user', content: text });
                    gState.wizardHistory.push({ role: 'model', content: data.chat_response });
                }
            } catch (e) {}
        }

        function appendChat(id, role, text) {
            const div = document.createElement('div');
            div.className = `p-2 rounded ${role === 'user' ? 'bg-blue-100 ml-8' : 'bg-white mr-8 border'}`;
            div.innerHTML = `<strong>${role==='user'?'You':'AI'}:</strong> ${text}`;
            document.getElementById(id).appendChild(div);
            document.getElementById(id).scrollTop = document.getElementById(id).scrollHeight;
        }

    </script>
</body>
</html>
